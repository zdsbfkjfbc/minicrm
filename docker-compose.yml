version: '3.9'

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: minicrm
      POSTGRES_USER: minicrm
      POSTGRES_PASSWORD: minicrm
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U minicrm"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8
    ports:
      - "6379:6379"

  web:
    build: .
    image: minicrm-app
    command: ["gunicorn", "-b", "0.0.0.0:5000", "run:app"]
    volumes:
      - .:/app
    environment:
      SECRET_KEY: "${SECRET_KEY}"
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:${DB_PORT:-5432}/${POSTGRES_DB}"
      REDIS_URL: "redis://redis:6379/0"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "5000:5000"

volumes:
  db-data:
