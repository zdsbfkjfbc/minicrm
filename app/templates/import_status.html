{% extends "base.html" %}

{% block content %}
<div class="status-wrap">
    <h1 class="status-title">Status da Importação</h1>
    <p class="mt-4">Job <strong>{{ job_id }}</strong></p>
    <p class="mt-2">Situação atual: <strong class="text-primary">{{ status }}</strong></p>
    <p class="text-xs mt-4">As importações são processadas em background; atualize esta página para verificar o progresso.</p>
    <a href="{{ url_for('import_csv') }}"
        class="status-link inline-flex items-center justify-center px-4 py-2 border text-xs font-medium clip hover:opacity-70 transition-opacity text-primary">
        Voltar
    </a>
</div>
{% endblock %}
